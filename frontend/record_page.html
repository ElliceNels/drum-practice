<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Web Audio Input Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
  <main class="app">
    <h1>Light App</h1>
    <p>
      <span class="status-label">Status:</span>
      <span id="status-text">Idle</span>
    </p>

    <button id="start-button">Start</button>
    <button id="stop-button">Stop</button>

    <div id="tempo-controls" style="margin-top:12px;">
      <label>
        <input type="checkbox" id="use-tempo-checkbox" /> Use desired tempo
      </label>
      <input id="tempo-input" type="number" step="0.1" min="20" max="400" value="120.0"
             style="width:90px; margin-left:8px; display:none;" />
      <span id="tempo-unit" style="margin-left:6px; display:none;">BPM</span>
    </div>
  </main>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" integrity="sha384-mkQ3/7FUtcGyoppY6bz/PORYoGqOl7/aSUMn2ymDOJcapfS6PHqxhRTMh1RR0Q6+" crossorigin="anonymous"></script>
  <script type="module" src="recording.js"></script>
</body>
</html>
